name: agent_pro_ghana
description: Agent Pro Ghana - One App. Every Mobile Money Business.
version: 2.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.0.0

  # API & Networking
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # Local Storage (Encrypted)
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3
  hive_flutter: ^1.1.0

  # Biometrics
  local_auth: ^2.2.0

  # Firebase
  firebase_core: ^3.1.1
  firebase_messaging: ^15.0.3
  firebase_analytics: ^11.1.0
  firebase_crashlytics: ^4.0.3

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  lottie: ^3.1.0

  # Charts
  fl_chart: ^0.68.0

  # File handling
  path_provider: ^2.1.3
  open_file: ^3.3.2
  share_plus: ^9.0.0
  file_picker: ^8.0.3
  image_picker: ^1.1.2

  # PDF viewer
  flutter_pdfview: ^1.3.2

  # Permissions
  permission_handler: ^11.3.1

  # Date/Time
  intl: ^0.20.2

  # Phone formatting
  phone_form_field: ^10.0.0

  # Connectivity
  connectivity_plus: ^6.0.3

  # URL launching (email, web links)
  url_launcher: ^6.3.0

  # UUID
  uuid: ^4.4.0

  # JSON
  json_annotation: ^4.9.0

  # Root detection (security)
  flutter_jailbreak_detection: ^1.10.0

  # SIM/USSD
  sim_card_info: ^1.0.1

  # USSD runner (Dart FFI bridge to Android telephony)
  # ussd_advanced: ^1.0.0  # Add after confirming Play Store policy

  # Notifications
  flutter_local_notifications: ^17.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.10
  json_serializable: ^6.8.0
  bloc_test: ^9.1.7
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
