name: Agent Pro Ghana CI/CD

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

env:
  NODE_VERSION: '20'
  FLUTTER_VERSION: '3.22.0'

jobs:

  # ── Backend Tests ─────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agentpro_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run database migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/agentpro_test
          NODE_ENV: test
        run: node scripts/migrate.js

      - name: Run unit tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/agentpro_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
        run: npm test -- --testPathPattern=unit

      - name: Run integration tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/agentpro_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
        run: npm test -- --testPathPattern=integration

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/

  # ── Backend Lint ─────────────────────────────────────────
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - name: Check for security vulnerabilities
        working-directory: backend
        run: npm audit --audit-level=high

  # ── Admin Portal Build ────────────────────────────────────
  admin-build:
    name: Admin Portal Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: admin_portal/package-lock.json
      - run: npm ci
        working-directory: admin_portal
      - run: npm run build
        working-directory: admin_portal
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-portal-dist
          path: admin_portal/dist/

  # ── Flutter Build ─────────────────────────────────────────
  flutter-build:
    name: Flutter Android Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Analyze Flutter code
        working-directory: flutter_app
        run: flutter analyze --no-fatal-infos

      - name: Run Flutter tests
        working-directory: flutter_app
        run: flutter test

      - name: Create dummy google-services.json for CI
        working-directory: flutter_app/android/app
        run: |
          cat > google-services.json << 'EOF'
          {
            "project_info": { "project_id": "ci-test" },
            "client": [{
              "client_info": { "android_client_info": { "package_name": "com.agentpro.ghana" } },
              "api_key": [{ "current_key": "ci-test-key" }]
            }]
          }
          EOF

      - name: Build debug APK
        working-directory: flutter_app
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-debug.apk

  # ── Deploy Backend (main branch only) ────────────────────
  deploy-backend:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    needs: [backend-test, backend-lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy to Railway
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service agentpro-api

  # ── Deploy Admin Portal (main branch only) ────────────────
  deploy-admin:
    name: Deploy Admin Portal
    runs-on: ubuntu-latest
    needs: [admin-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
        working-directory: admin_portal
      - run: npm run build
        working-directory: admin_portal
      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: admin_portal/dist
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions — ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
